<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OWAS 평가도구</title>
<style>
body {
    font-family: sans-serif;
    line-height: 1.6;
    margin: 0;
    padding: 20px;
    background-color: #f4f4f4;
}

.container {
    max-width: 1000px;
    margin: auto;
    background: #fff;
    padding: 30px;
    border-radius: 8px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

h1, h2 {
    color: #333;
    text-align: center;
    margin-bottom: 20px;
}

.form-group {
    margin-bottom: 15px;
}

label {
    display: block;
    margin-bottom: 5px;
    font-weight: bold;
    color: #555;
}

select {
    width: 100%;
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 4px;
    box-sizing: border-box; /* padding과 border가 width에 포함되도록 */
}

button {
    display: block;
    width: 100%;
    padding: 12px;
    background-color: #007bff;
    color: white;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 16px;
    margin-top: 20px;
}

button:hover {
    background-color: #0056b3;
}

.result-display {
    margin-top: 30px;
    padding: 20px;
    background-color: #e9ecef;
    border: 1px solid #ced4da;
    border-radius: 4px;
}

.result-display h2 {
    margin-top: 0;
    color: #333;
}

.result-display p {
    margin-bottom: 10px;
    font-size: 1.1em;
}

.result-display span {
    font-weight: bold;
}

/* 위험 등급별 색상 (선택 사항) */
.ac1 { color: green; }
.ac2 { color: orange; }
.ac3 { color: red; }
.ac4 { color: darkred; font-weight: bold; }
</style>

</head>
<body>
    <div class="container">
        <h1>OWAS 작업자세 평가</h1>
        <p>작업자의 자세와 부하를 선택하세요.</p>

        <div class="form-group">
            <label for="back">▶ 허리(Back):</label>
            <select id="back">
                <option value="1">1: 똑바로 폄</option>
                <option value="2">2: 구부림 (20˚ 이상)</option>
                <option value="3">3: 비틀림 (20˚ 이상)</option>
                <option value="4">4: 구부리고 비틀림 (20˚ 이상)</option>
            </select>
        </div>

        <div class="form-group">
            <label for="arms">▶ 상지(Arms):</label>
            <select id="arms">
                <option value="1">1: 양팔 어깨 아래</option>
                <option value="2">2: 한 팔 어깨 높이 위</option>
                <option value="3">3: 양팔 어깨 높이 위</option>
            </select>
        </div>

        <div class="form-group">
            <label for="legs">▶ 하지(Legs):</label>
            <select id="legs">
                <option value="1">1: 앉음 (의자)</option>
                <option value="2">2: 똑바로 섬 (양 발에 무게 중심)</option>
                <option value="3">3: 짝다리로 바로 섬 (한쪽 발에 무게 중심, 짝다리)</option>
                <option value="4">4: 무릎 구부리고 섬 (양 발에 무게 중심)</option>
                <option value="5">5: 짝다리로 무릎 구부리고 섬 (한쪽 발에 무게 중심)</option>
                <option value="6">6: 쪼그려 앉음, 무릎 꿇음</option>
                <option value="7">7: 걷거나 이동 (보행)</option>
            </select>
        </div>

        <div class="form-group">
            <label for="load">▶ 무게(Load/Force):</label>
            <select id="load">
                <option value="1">1: 10kg 미만</option>
                <option value="2">2: 10kg~20kg 미만</option>
                <option value="3">3: 20kg 이상</option>
            </select>
        </div>

        <button id="calculateBtn">OWAS 평가 실행</button>

        <div id="result" class="result-display" style="display: none;">
            <h2>평가 결과</h2>
            <p><strong>OWAS 코드:</strong> <span id="owasCode"></span></p>
            <p><strong>위험 등급 (Action Category):</strong> <span id="actionCategory"></span></p>
            <p><strong>조치 사항:</strong> <span id="actionMessage"></span></p>
        </div>
    </div>

// DOM 요소 가져오기
const backSelect = document.getElementById('back');
const armsSelect = document.getElementById('arms');
const legsSelect = document.getElementById('legs');
const loadSelect = document.getElementById('load');
const calculateBtn = document.getElementById('calculateBtn');
const resultDiv = document.getElementById('result');
const owasCodeSpan = document.getElementById('owasCode');
const actionCategorySpan = document.getElementById('actionCategory');
const actionMessageSpan = document.getElementById('actionMessage');

// 버튼 클릭 이벤트 리스너 추가
calculateBtn.addEventListener('click', () => {
    // 선택된 값 가져오기
    const backValue = backSelect.value;
    const armsValue = armsSelect.value;
    const legsValue = legsSelect.value;
    const loadValue = loadSelect.value;

    // OWAS 코드 생성 (4자리 숫자 문자열)
    const owasCode = `${backValue}${armsValue}${legsValue}${loadValue}`;

    // OWAS 코드에 해당하는 위험 등급 찾기 (단순화된 버전)
    // 실제로는 이 부분이 훨씬 복잡한 조회 로직이 됩니다.
    // 이 예제에서는 미리 정의된 간단한 객체에서 찾습니다.
    let resultData;
    if (owasActionCategories[owasCode]) {
        resultData = owasActionCategories[owasCode];
    } else {
        // 테이블에 없는 코드에 대한 처리 (여기서는 임의로 AC 2로 설정)
        // 실제 시스템에서는 모든 코드가 매핑되어 있어야 함
        console.warn(`OWAS 코드 '${owasCode}'에 대한 정의된 Action Category가 없습니다. 임의 값을 사용합니다.`);
        // 가장 보수적인 접근 또는 기본값 설정 가능. 여기서는 예시로 AC 2 지정.
        let calculatedAC = 2; // 기본적으로 약간의 위험으로 간주
        if (backValue === '4' || loadValue === '3') calculatedAC = 4; // 등 4 또는 하중 3은 보통 위험 높음
        else if (backValue === '2' || backValue === '3' || armsValue === '3' || legsValue === '4' || legsValue === '5' || legsValue === '6' || loadValue === '2') calculatedAC = 3; // 중간 위험 요소

        resultData = { category: calculatedAC, message: actionMessages[calculatedAC] || "정의되지 않은 위험 등급" };
    }


    // 결과 표시
    owasCodeSpan.textContent = owasCode;
    actionCategorySpan.textContent = `AC ${resultData.category}`;
    actionMessageSpan.textContent = resultData.message;

    // 위험 등급별 스타일 적용 (선택 사항)
    actionCategorySpan.classList.remove("ac1", "ac2", "ac3", "ac4");
    actionCategorySpan.classList.add(`ac${resultData.category}`);
    actionMessageSpan.className = ''; // 이전 클래스 제거
    actionMessageSpan.classList.add(`ac${resultData.category}`);

    resultDiv.style.display = 'block'; // 결과 영역 보이기
});
</script>
