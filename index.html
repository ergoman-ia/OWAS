<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OWAS 기본 분석</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 모든 텍스트에 Inter 폰트 적용 */
        body {
            font-family: 'Inter', sans-serif;
            padding: 2px;
            /* 전체 페이지 상단 여백 최소화 */
        }

        /* OWAS 위험 등급별 색상 정의 (OWAS.html에서 가져옴) */
        .ac1 {
            color: green;
        }

        .ac2 {
            color: orange;
        }

        .ac3 {
            color: red;
        }

        .ac4 {
            color: darkred;
            font-weight: bold;
        }

        /* 이미지 컨테이너: 내부 요소를 세로로 정렬하고, 설명 텍스트는 위, 이미지는 아래로 정렬 */
        .image-container {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100px;
            border-radius: 0.5rem;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06);
            cursor: pointer;
            padding: 0;
            background-color: #fff;
        }

        /* 선택된 이미지에 시각적 피드백 제공 */
        .selected-image {
            border: 3px solid #6366F1;
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.6);
        }

        /* 이미지 자체의 스타일 */
        .image-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            display: block;
        }

        /* 선택된 항목의 설명을 표시할 영역 스타일 */
        .selected-description-display {
            font-size: 0.9rem;
            color: #374151;
            text-align: center;
            margin-top: 0.25rem;
            min-height: 4.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 0.5rem;
            background-color: #F3F4F6;
            border-radius: 0.25rem;
            border: 1px solid #E5E7EB;
        }
    </style>
</head>

                    };

                    imageContainer.appendChild(imgElement); // 이미지 추가

                    // 요소 클릭 이벤트 리스너 추가
                    imageContainer.addEventListener('click', () => {
                        // 이전에 선택된 이미지가 있다면 테두리 제거
                        if (selectedImageElements[categoryName]) {
                            selectedImageElements[categoryName].classList.remove('selected-image');
                        }

                        // 현재 클릭된 이미지에 테두리 추가
                        imageContainer.classList.add('selected-image');
                        // 현재 선택된 이미지 요소 저장
                        selectedImageElements[categoryName] = imageContainer;

                        // 해당 카테고리의 선택 설명 표시 요소 가져오기
                        const displayElement = categorySelectionDisplays[categoryName];
                        // 선택 설명 표시 요소의 텍스트를 현재 요소의 설명으로 업데이트
                        displayElement.textContent = owasDescriptions[categoryName][i];

                        // 선택된 OWAS 값 업데이트
                        selectedOWASValues[categoryName] = i;

                        // OWAS AC 값 계산 및 표시
                        calculateOWAS();
                    });

                    cellWrapper.appendChild(imageContainer);
                    
                    if (categoryName === '무게') {
                        const textLabel = document.createElement('div');
                        // 텍스트 스타일 지정 (작은 글씨, 회색, 중앙 정렬, 상단 여백)
                        textLabel.classList.add('text-xs', 'text-gray-600', 'mt-2', 'text-center', 'font-medium');
                        // owasDescriptions에서 텍스트 가져오기 (예: "1: 10kg 미만")
                        textLabel.textContent = owasDescriptions[categoryName][i];

                        cellWrapper.appendChild(textLabel);
                    }

                    categoryImageGrid.appendChild(cellWrapper);
                }

                // 5. 완성된 카테고리 섹션을 메인 갤러리 컨테이너에 추가
                imageGalleryContainer.appendChild(categorySection);
            }
        });
    </script>
</body>

</html>
